    <linearGradient id="wac3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A2018"/>
      <stop offset="100%" stop-color="#121610"/>
    </linearGradient>
    <linearGradient id="wac4" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2A1E14"/>
      <stop offset="100%" stop-color="#201812"/>
    </linearGradient>
    <linearGradient id="waheart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4956A"/>
      <stop offset="100%" stop-color="#A07050"/>
