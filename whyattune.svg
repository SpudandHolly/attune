<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700">
  <defs>
    <linearGradient id="wabg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F1812"/>
      <stop offset="50%" stop-color="#2A1E14"/>
      <stop offset="100%" stop-color="#161008"/>
    </linearGradient>
    <linearGradient id="wac1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A1E14"/>
      <stop offset="100%" stop-color="#1F1510"/>
    </linearGradient>
    <linearGradient id="wac2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1A24"/>
      <stop offset="100%" stop-color="#161018"/>
