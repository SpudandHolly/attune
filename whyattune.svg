    <radialGradient id="wagl1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4956A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C4956A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wagl2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8A6AC4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8A6AC4" stop-opacity="0"/>
