    <radialGradient id="wagl3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6AC4A0" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6AC4A0" stop-opacity="0"/>
