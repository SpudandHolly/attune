  <text x="446" y="625" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#C4956A" fill-opacity="0.9" text-anchor="middle" letter-spacing="0.14em">MEANINGFUL CONNECTIONS</text>

  <!-- Outer border -->
