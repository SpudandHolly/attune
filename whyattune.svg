  <rect x="52" y="499" width="90" height="6" rx="2" fill="#6AC4A0" fill-opacity="0.08"/>
  <rect x="52" y="499" width="72" height="6" rx="2" fill="#6AC4A0" fill-opacity="0.45"/>
  <text x="40" y="520" font-family="'DM Mono','Courier New',monospace" font-size="7.5" fill="#6AC4A0" fill-opacity="0.6" letter-spacing="0.08em">A</text>
