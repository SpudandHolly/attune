<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42" width="42" height="42">
  <defs>
    <clipPath id="circle">
      <circle cx="21" cy="21" r="21"/>
    </clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A1E14"/>
      <stop offset="100%" style="stop-color:#1A1208"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7A4A28"/>
      <stop offset="100%" style="stop-color:#5A3018"/>
    </linearGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0E08"/>
      <stop offset="100%" style="stop-color:#0E0804"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A3A28"/>
      <stop offset="100%" style="stop-color:#1A2A18"/>
    </linearGradient>
  </defs>
  <rect width="42" height="42" fill="url(#bg)" clip-path="url(#circle)"/>
  <!-- body -->
  <ellipse cx="21" cy="54" rx="19" ry="16" fill="url(#shirt)" clip-path="url(#circle)"/>
  <!-- neck -->
  <rect x="17" y="29" width="8" height="8" rx="2" fill="url(#skin)"/>
  <!-- head - slightly wider jaw for mature look -->
  <ellipse cx="21" cy="22" rx="10.5" ry="11" fill="url(#skin)"/>
  <!-- close-cropped hair -->
  <ellipse cx="21" cy="12" rx="10.5" ry="5" fill="url(#hair)"/>
  <rect x="10.5" y="11" width="3" height="6" rx="1.5" fill="url(#hair)"/>
  <rect x="28.5" y="11" width="3" height="6" rx="1.5" fill="url(#hair)"/>
  <!-- slight fade on sides -->
  <ellipse cx="13" cy="16" rx="3" ry="4" fill="url(#hair)" opacity="0.7"/>
  <ellipse cx="29" cy="16" rx="3" ry="4" fill="url(#hair)" opacity="0.7"/>
  <!-- eyebrows - thicker, mature -->
  <path d="M14.5 18.5 Q17 17.2 19.5 18" stroke="#1A0A04" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M22.5 18 Q25 17.2 27.5 18.5" stroke="#1A0A04" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="17" cy="20.5" rx="2.3" ry="1.7" fill="#0E0804"/>
  <ellipse cx="25" cy="20.5" rx="2.3" ry="1.7" fill="#0E0804"/>
  <circle cx="17.8" cy="19.9" r="0.55" fill="white" opacity="0.7"/>
  <circle cx="25.8" cy="19.9" r="0.55" fill="white" opacity="0.7"/>
  <!-- nose - broader bridge -->
  <path d="M20 21.5 L18.5 24.5 Q21 25.8 23.5 24.5 L22 21.5" stroke="#4A2810" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <ellipse cx="21" cy="24.8" rx="2.5" ry="0.8" fill="#4A2810" opacity="0.3"/>
  <!-- warm smile -->
  <path d="M17 27.5 Q21 30 25 27.5" stroke="#4A2810" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <!-- subtle beard shadow -->
  <ellipse cx="21" cy="29" rx="9" ry="3.5" fill="#3A1A08" opacity="0.25"/>
  <!-- slight greying temples hint -->
  <ellipse cx="12" cy="18" rx="1.5" ry="2.5" fill="#8A6A50" opacity="0.3"/>
  <ellipse cx="30" cy="18" rx="1.5" ry="2.5" fill="#8A6A50" opacity="0.3"/>
</svg>
