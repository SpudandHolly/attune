<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42" width="42" height="42">
  <defs>
    <clipPath id="circle">
      <circle cx="21" cy="21" r="21"/>
    </clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A1E14"/>
      <stop offset="100%" style="stop-color:#1A1208"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8845A"/>
      <stop offset="100%" style="stop-color:#A86840"/>
    </linearGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0E08"/>
      <stop offset="100%" style="stop-color:#0A0604"/>
    </linearGradient>
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7A3A5A"/>
      <stop offset="100%" style="stop-color:#5A2A40"/>
    </linearGradient>
  </defs>
  <rect width="42" height="42" fill="url(#bg)" clip-path="url(#circle)"/>
  <!-- body -->
  <ellipse cx="21" cy="54" rx="18" ry="16" fill="url(#top)" clip-path="url(#circle)"/>
  <!-- neck -->
  <rect x="17.5" y="28" width="7" height="9" rx="2" fill="url(#skin)"/>
  <!-- head -->
  <ellipse cx="21" cy="21" rx="9.5" ry="11" fill="url(#skin)"/>
  <!-- hair top + flowing hair -->
  <ellipse cx="21" cy="11" rx="9.5" ry="5.5" fill="url(#hair)"/>
  <rect x="11" y="10" width="3.5" height="16" rx="1.5" fill="url(#hair)"/>
  <rect x="27.5" y="10" width="3.5" height="14" rx="1.5" fill="url(#hair)"/>
  <!-- hair parting detail -->
  <path d="M21 10 L21 15" stroke="#2A1A10" stroke-width="0.8" opacity="0.5"/>
  <!-- eyebrows -->
  <path d="M15 18 Q17 17 19 17.8" stroke="#1A0A04" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M23 17.8 Q25 17 27 18" stroke="#1A0A04" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- eyes with lashes -->
  <ellipse cx="17" cy="19.8" rx="2.3" ry="1.7" fill="#1A0A04"/>
  <ellipse cx="25" cy="19.8" rx="2.3" ry="1.7" fill="#1A0A04"/>
  <circle cx="17.7" cy="19.3" r="0.5" fill="white" opacity="0.8"/>
  <circle cx="25.7" cy="19.3" r="0.5" fill="white" opacity="0.8"/>
  <!-- eyelashes hint -->
  <path d="M14.8 18.5 Q17 17.5 19.3 18.5" stroke="#1A0A04" stroke-width="0.8" fill="none"/>
  <path d="M22.7 18.5 Q25 17.5 27.2 18.5" stroke="#1A0A04" stroke-width="0.8" fill="none"/>
  <!-- nose -->
  <path d="M20.5 21 L19.5 23.5 Q21 24.2 22.5 23.5 L21.5 21" stroke="#906030" stroke-width="0.7" fill="none" stroke-linecap="round"/>
  <!-- lips -->
  <path d="M17.5 26 Q21 27.8 24.5 26" stroke="#904050" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M18.5 25.5 Q21 26.5 23.5 25.5" stroke="#904050" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <!-- bindi dot -->
  <circle cx="21" cy="15.5" r="0.8" fill="#C4956A" opacity="0.7"/>
</svg>
